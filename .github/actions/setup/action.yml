name: Setup workspace
description: pnpm + Node + restore caches + install workspace dependencies.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: pnpm
    - shell: bash
      run: pnpm install --frozen-lockfile
