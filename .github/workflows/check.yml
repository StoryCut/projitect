name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22.12.0, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm tc
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm knip
      - run: pnpm --filter website check:errors
        if: matrix.node == '24'
      - run: pnpm --filter website check:examples
        if: matrix.node == '24'
      - run: pnpm build
